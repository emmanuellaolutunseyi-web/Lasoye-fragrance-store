<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collections Page</title>
  <link rel="stylesheet" href="collections.css">
  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.development.min.js"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.development.min.js"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.5/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>    
    <script id="react-code" type="text/babel" data-presets="react" src="search.jsx"></script>
    
    <script type="text/babel" data-presets="react">
        setTimeout(() => {
            if (typeof ProductGrid !== 'undefined') {
                ReactDOM.createRoot(document.getElementById('root')).render(<ProductGrid />);
            } else {
                console.error("ProductGrid component failed to load from search.jsx");
            }
        }, 100);
    </script>
</body>

</html>
